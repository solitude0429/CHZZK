<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CHZZK diagnostics</title>
    <style>
      body {
        font:
          13px system-ui,
          sans-serif;
        margin: 12px;
        min-width: 460px;
      }
      button {
        margin: 4px 4px 8px 0;
      }
      pre,
      textarea {
        box-sizing: border-box;
        width: 100%;
      }
      textarea {
        height: 280px;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 12px;
      }
      .warning {
        color: #8a4b00;
      }
      #status {
        min-height: 1.4em;
      }
    </style>
  </head>
  <body>
    <h1>CHZZK diagnostics</h1>
    <p>
      CHZZK live tab에서 관측된 HLS 요청만 이 브라우저의 확장 프로그램 저장소에 로컬로 저장합니다. 외부
      collector로 전송하지 않습니다. HLS URL query/hash, 서명성 path 값, 전체 subdomain과 port는 저장 전에
      제거되며 허용 목록의 canonical domain label만 남습니다.
    </p>
    <p class="warning">
      이 popup은 네이버 공식 승인 상태를 의미하지 않습니다. Firefox 설치용 서명과 서비스 제공자 승인은
      별개입니다.
    </p>

    <button id="refresh">새로고침</button>
    <button id="copy">JSON 복사</button>
    <button id="clear">로그 삭제</button>
    <p id="status" role="status" aria-live="polite"></p>
    <pre id="summary"></pre>
    <textarea id="payload" spellcheck="false"></textarea>
    <script src="diagnostics.js"></script>
  </body>
</html>
