name: Sync generated release files

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "package.json"
      - "manifest.json"
      - "policy/quality-policy.json"
      - "src/**"
      - ".github/workflows/sync-generated-release-files.yml"
  push:
    branches: ["main"]
    paths:
      - "package.json"
      - "manifest.json"
      - "policy/quality-policy.json"
      - "src/**"
      - ".github/workflows/sync-generated-release-files.yml"

permissions:
  contents: read

jobs:
  check-generated-release-files:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --package-lock-only --ignore-scripts
      - run: npm ci
      - run: npm run build:runtime
      - run: git diff --exit-code -- package-lock.json background.js diagnostics.js site-observer.js

  sync-generated-release-files:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --package-lock-only --ignore-scripts
      - run: npm ci
      - run: npm run build:runtime
      - uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: sync generated release files
          file_pattern: package-lock.json background.js diagnostics.js site-observer.js
