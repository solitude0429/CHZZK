name: Live update health

on:
  pull_request:
    paths:
      - ".github/workflows/live-update-health.yml"
      - "manifest.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/check-live-update.js"
      - "scripts/lib/amo-client.js"
      - "scripts/lib/live-update-health.js"
      - "scripts/lib/release-artifacts.js"
      - "scripts/lib/release-version.js"
      - "tests/unit/live-update-health.test.js"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-update-health-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-live-update:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Require the exact health-check source tree
        env:
          EXPECTED_SOURCE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SOURCE_SHA"
          git diff --exit-code
          git diff --cached --exit-code
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: npm
          node-version: 22
      - run: npm ci
      - name: Verify the production update manifest and complete hosted release set
        run: npm run check:live-update
