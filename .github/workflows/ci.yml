name: CI

on:
  pull_request:
  push:
    branches: ["feat/**", "main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run check:generated
      - run: npm run validate:manifest
      - run: npm run validate:project
      - run: npm run lint
      - run: npm run lint:webext
      - run: npm run test
      - run: npm run test:ops
      - run: npm run audit:deps
      - run: npm run build
      - run: npm run audit:package
      - uses: actions/upload-artifact@v4
        with:
          name: chzzk-extension
          path: dist/*.zip
