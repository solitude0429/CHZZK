name: Sign and publish Firefox add-on

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Create or update the GitHub release for this package version
        required: true
        type: boolean
        default: true
      diagnostics_only:
        description: Run AMO JWT authentication diagnostics without uploading an extension
        required: false
        type: boolean
        default: false
  push:
    branches: ["main"]
    paths:
      - "manifest.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/sign-unlisted.yml"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  amo-auth-diagnostics:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.diagnostics_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Probe AMO JWT authentication without upload
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          node <<'NODE'
          const crypto = require("node:crypto");

          async function main() {

          function b64url(value) {
            return Buffer.from(value).toString("base64url");
          }

          function normalize(value) {
            const raw = value || "";
            let trimmed = raw.trim();
            if ((trimmed.startsWith("'") && trimmed.endsWith("'")) || (trimmed.startsWith('"') && trimmed.endsWith('"'))) {
              trimmed = trimmed.slice(1, -1).trim();
            }
            return { raw, value: trimmed };
          }

          function signJwt(payload, secret) {
            const header = { alg: "HS256", typ: "JWT" };
            const encoded = `${b64url(JSON.stringify(header))}.${b64url(JSON.stringify(payload))}`;
            const sig = crypto.createHmac("sha256", Buffer.from(secret, "utf8")).update(encoded).digest("base64url");
            return `${encoded}.${sig}`;
          }

          async function probe(name, payload, prefix) {
            const jwt = signJwt(payload, apiSecret);
            const form = new FormData();
            form.append("channel", "unlisted");
            let authHeader = jwt;
            if (prefix.length > 0) {
              authHeader = `${prefix} ${jwt}`;
            }
            const response = await fetch("https://addons.mozilla.org/api/v5/addons/upload/", {
              method: "POST",
              headers: {
                Authorization: authHeader,
                "User-Agent": "chzzk-amo-auth-diagnostics",
              },
              body: form,
            });
            let detail = null;
            try {
              const parsed = await response.clone().json();
              detail = parsed.detail || parsed.error || parsed.errors || parsed.non_field_errors || null;
            } catch {
              detail = (await response.text()).slice(0, 160);
            }
            console.log(JSON.stringify({ name, status: response.status, ok: response.ok, detail }, null, 2));
          }

          async function inspectExistingVersion(payload) {
            const jwt = signJwt(payload, apiSecret);
            const manifest = require("./manifest.json");
            const addonId = manifest.browser_specific_settings.gecko.id;
            const version = manifest.version;
            const url = `https://addons.mozilla.org/api/v5/addons/addon/${encodeURIComponent(addonId)}/versions/${encodeURIComponent(version)}/`;
            const response = await fetch(url, {
              headers: {
                Authorization: `JWT ${jwt}`,
                Accept: "application/json",
                "User-Agent": "chzzk-amo-auth-diagnostics",
              },
            });
            let parsed = null;
            try {
              parsed = await response.json();
            } catch {
              parsed = null;
            }
            const file = parsed && parsed.file ? parsed.file : null;
            console.log(
              JSON.stringify(
                {
                  name: "existing-version-inspection",
                  status: response.status,
                  ok: response.ok,
                  top_level_keys: parsed ? Object.keys(parsed).sort() : [],
                  file_keys: file ? Object.keys(file).sort() : [],
                  file_status: file ? file.status || null : null,
                  file_url_present: Boolean(file && file.url),
                  edit_url_present: Boolean(parsed && parsed.edit_url),
                },
                null,
                2,
              ),
            );
          }

          const issuerInfo = normalize(process.env.WEB_EXT_API_KEY);
          const secretInfo = normalize(process.env.WEB_EXT_API_SECRET);
          const apiKey = issuerInfo.value;
          const apiSecret = secretInfo.value;
          const now = Math.floor(Date.now() / 1000);
          const diagnostics = {
            issuer_present: apiKey.length > 0,
            secret_present: apiSecret.length > 0,
            issuer_shape_ok: /^user:\d+:\d+$/.test(apiKey),
            issuer_had_outer_quotes: issuerInfo.raw.trim() !== apiKey && /^['"].*['"]$/.test(issuerInfo.raw.trim()),
            issuer_had_leading_or_trailing_whitespace: issuerInfo.raw !== issuerInfo.raw.trim(),
            issuer_has_line_break: /[\r\n]/.test(issuerInfo.raw),
            issuer_has_invisible_unicode: /[\u200B-\u200D\uFEFF]/.test(issuerInfo.raw),
            secret_had_leading_or_trailing_whitespace: secretInfo.raw !== secretInfo.raw.trim(),
            secret_has_line_break: /[\r\n]/.test(secretInfo.raw),
            secret_has_invisible_unicode: /[\u200B-\u200D\uFEFF]/.test(secretInfo.raw),
          };
          console.log(JSON.stringify({ local_sanity: diagnostics }, null, 2));
          if (!apiKey || !apiSecret) process.exit(0);

          const docsStylePayload = { iss: apiKey, jti: crypto.randomUUID(), iat: now, exp: now + 60 };
          await probe("web-ext-style-jwt-prefix", { iss: apiKey, iat: now, exp: now + 300 }, "JWT");
          await probe("docs-style-jti-jwt-prefix", docsStylePayload, "JWT");
          await probe("docs-style-jti-no-prefix", { iss: apiKey, jti: crypto.randomUUID(), iat: now, exp: now + 60 }, "");
          await inspectExistingVersion(docsStylePayload);
          }

          main().catch((error) => {
            console.error(error && error.message ? error.message : error);
            process.exit(1);
          });
          NODE

  sign-unlisted:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.diagnostics_only }}
    runs-on: ubuntu-latest
    environment: firefox-signing
    steps:
      - uses: actions/checkout@v4
      - name: Enforce protected signing ref
        run: |
          set -euo pipefail
          default_ref="refs/heads/${{ github.event.repository.default_branch }}"
          case "${{ github.ref }}" in
            "$default_ref"|refs/tags/v*) ;;
            *)
              echo "Signing is allowed only from the default branch or v* release tags." >&2
              exit 1
              ;;
          esac
          if [ "${{ github.ref_protected }}" != "true" ]; then
            echo "Signing ref must be protected before AMO credentials are used." >&2
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - name: Prepare package metadata
        id: package
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          {
            echo "version=$version"
            echo "tag=v$version"
            echo "release_xpi=dist/chzzk-${version}-signed.xpi"
          } >> "$GITHUB_OUTPUT"
      - name: Sign with AMO unlisted channel
        run: npm run sign:unlisted
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
      - name: Normalize signed XPI name and checksum
        id: signed_xpi
        run: |
          set -euo pipefail
          version="${{ steps.package.outputs.version }}"
          release_xpi="${{ steps.package.outputs.release_xpi }}"
          signed_count=$(find dist/signed -maxdepth 1 -type f -name '*.xpi' | wc -l | tr -d ' ')
          test "$signed_count" = "1"
          signed_xpi=$(find dist/signed -maxdepth 1 -type f -name '*.xpi' | head -n 1)
          cp "$signed_xpi" "$release_xpi"
          test -f "$release_xpi"
          sha256=$(sha256sum "$release_xpi" | cut -d' ' -f1)
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
      - run: npm run build:update-manifest
      - run: npm run validate:update-manifest
      - name: Attest release provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/chzzk-${{ steps.package.outputs.version }}.zip
            dist/chzzk-${{ steps.package.outputs.version }}-signed.xpi
      - name: Write release notes
        run: |
          set -euo pipefail
          zip_sha=$(sha256sum "dist/chzzk-${{ steps.package.outputs.version }}.zip" | cut -d' ' -f1)
          cat > release-notes.md <<EOF
          ## Summary
          - AMO unlisted signed Firefox install package.
          - Firefox automatic-update manifest targets the private internal HTTPS update host.
          - GitHub artifact attestations bind release assets to this signing workflow and source commit.

          ## Source provenance
          - Repository: ${{ github.repository }}
          - Commit: ${{ github.sha }}
          - Workflow: .github/workflows/sign-unlisted.yml

          ## Update manifest
          - https://chzzk-updates.alpha-apple.dedyn.io/updates.json

          ## Assets
          - \`chzzk-${{ steps.package.outputs.version }}-signed.xpi\` — signed install/update package.
          - \`chzzk-${{ steps.package.outputs.version }}.zip\` — unsigned source/runtime package from \`web-ext build\`.

          ## Checksums
          - \`chzzk-${{ steps.package.outputs.version }}-signed.xpi\` SHA-256: \`${{ steps.signed_xpi.outputs.sha256 }}\`
          - \`chzzk-${{ steps.package.outputs.version }}.zip\` SHA-256: \`${zip_sha}\`
          EOF
      - name: Create or update release
        if: ${{ github.event_name == 'push' || inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.package.outputs.tag }}"
          version="${{ steps.package.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "dist/chzzk-${version}.zip" "dist/chzzk-${version}-signed.xpi" --clobber
            gh release edit "$tag" --title "CHZZK ${version}" --notes-file release-notes.md --latest
          else
            gh release create "$tag" "dist/chzzk-${version}.zip" "dist/chzzk-${version}-signed.xpi" \
              --target "$GITHUB_SHA" \
              --title "CHZZK ${version}" \
              --notes-file release-notes.md \
              --latest
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: chzzk-signed-xpi
          path: dist/chzzk-${{ steps.package.outputs.version }}-signed.xpi
      - uses: actions/upload-artifact@v4
        with:
          name: chzzk-update-site
          path: dist/update-site
