name: Sign and stage unlisted Firefox release

on:
  repository_dispatch:
    types: [chzzk-release-preflight-v1]

permissions:
  contents: read

concurrency:
  group: sign-unlisted-${{ github.event.client_payload.source_sha }}
  cancel-in-progress: false

jobs:
  authorize:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate administrator preflight handoff
        env:
          EXPECTED_OPERATOR: ${{ vars.RELEASE_OPERATOR_LOGIN }}
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const payload = event.client_payload;
          const expectedKeys = [
            "default_branch",
            "immutable_releases_verified",
            "operator_login",
            "source_sha",
            "verified_at",
            "version",
          ];
          const actualKeys = Object.keys(payload ?? {}).sort();
          if (JSON.stringify(actualKeys) !== JSON.stringify(expectedKeys)) {
            throw new Error("release dispatch payload keys are invalid");
          }
          if (process.env.GITHUB_EVENT_NAME !== "repository_dispatch" || event.action !== "chzzk-release-preflight-v1") {
            throw new Error("release dispatch event type is invalid");
          }
          if (!process.env.EXPECTED_OPERATOR || event.sender?.login !== process.env.EXPECTED_OPERATOR) {
            throw new Error("release dispatch sender is not the configured operator");
          }
          if (payload.operator_login !== process.env.EXPECTED_OPERATOR || process.env.GITHUB_ACTOR !== process.env.EXPECTED_OPERATOR) {
            throw new Error("release dispatch operator identity is inconsistent");
          }
          if (event.repository?.full_name !== process.env.GITHUB_REPOSITORY) {
            throw new Error("release dispatch repository is invalid");
          }
          if (payload.default_branch !== event.repository?.default_branch) {
            throw new Error("release dispatch default branch is invalid");
          }
          if (process.env.GITHUB_REF !== `refs/heads/${payload.default_branch}` || process.env.REF_PROTECTED !== "true") {
            throw new Error("release dispatch ref is not the protected default branch");
          }
          if (!/^[a-f0-9]{40}$/.test(payload.source_sha) || payload.source_sha !== process.env.GITHUB_SHA) {
            throw new Error("release dispatch source commit is not the exact default-branch head");
          }
          if (!/^(?:0|[1-9]\d{0,8})\.(?:0|[1-9]\d{0,8})\.(?:0|[1-9]\d{0,8})$/.test(payload.version)) {
            throw new Error("release dispatch version is not canonical");
          }
          if (payload.immutable_releases_verified !== true) {
            throw new Error("release dispatch did not prove immutable releases were enabled");
          }
          if (typeof payload.verified_at !== "string") {
            throw new Error("release dispatch administrator preflight timestamp is not a string");
          }
          const verifiedAt = Date.parse(payload.verified_at);
          const ageMs = Date.now() - verifiedAt;
          if (
            !Number.isFinite(verifiedAt) ||
            new Date(verifiedAt).toISOString() !== payload.verified_at ||
            ageMs < -60_000 ||
            ageMs > 30 * 60_000
          ) {
            throw new Error("release dispatch administrator preflight is stale or invalid");
          }
          NODE

  prepare:
    needs: authorize
    if: github.ref == format('refs/heads/{0}', github.event.client_payload.default_branch) && github.ref_protected == true
    permissions:
      attestations: read
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      client_sha256: ${{ steps.release.outputs.client_sha256 }}
      draft_signed_ready: ${{ steps.release.outputs.draft_signed_ready }}
      metadata_sha256: ${{ steps.release.outputs.metadata_sha256 }}
      reuse_existing: ${{ steps.release.outputs.reuse_existing }}
      signed_sha256: ${{ steps.release.outputs.signed_sha256 }}
      signer_sha256: ${{ steps.release.outputs.signer_sha256 }}
      source_sha256: ${{ steps.release.outputs.source_sha256 }}
      version: ${{ steps.release.outputs.version }}
      version_policy_sha256: ${{ steps.release.outputs.version_policy_sha256 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: npm
          node-version: 22
      - run: npm ci
      - run: npm run verify
      - name: Require verified source to match the protected commit
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git diff --exit-code
          git diff --cached --exit-code
      - run: npm run prepare:release
        env:
          CHZZK_SOURCE_DIGEST: ${{ github.sha }}
          CHZZK_SOURCE_REPOSITORY: ${{ github.repository }}
      - name: Anchor signer code to the protected commit
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git diff --exit-code
          git diff --cached --exit-code
          cmp scripts/sign-unlisted.js <(git show "$GITHUB_SHA:scripts/sign-unlisted.js")
          cmp scripts/lib/amo-client.js <(git show "$GITHUB_SHA:scripts/lib/amo-client.js")
          cmp scripts/lib/release-version.js <(git show "$GITHUB_SHA:scripts/lib/release-version.js")
      - id: release
        name: Verify prepared input and inspect all existing release state before signing
        env:
          CHZZK_RELEASE_METADATA: dist/release/chzzk-${{ github.event.client_payload.version }}-release-metadata.json
          CHZZK_SIGNED_XPI: dist/release/chzzk-${{ github.event.client_payload.version }}-signed.xpi
          CHZZK_SOURCE_ARCHIVE: dist/release/chzzk-${{ github.event.client_payload.version }}.zip
          CHZZK_SOURCE_DIGEST: ${{ github.sha }}
          CHZZK_VERSION: ${{ github.event.client_payload.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          SOURCE="dist/release/chzzk-${VERSION}.zip"
          METADATA="dist/release/chzzk-${VERSION}-release-metadata.json"
          test "$VERSION" = "${{ github.event.client_payload.version }}"
          SOURCE_SHA=$(sha256sum "$SOURCE" | cut -d ' ' -f1)
          METADATA_SHA=$(sha256sum "$METADATA" | cut -d ' ' -f1)
          SIGNER_SHA=$(git show "$GITHUB_SHA:scripts/sign-unlisted.js" | sha256sum | cut -d ' ' -f1)
          CLIENT_SHA=$(git show "$GITHUB_SHA:scripts/lib/amo-client.js" | sha256sum | cut -d ' ' -f1)
          VERSION_POLICY_SHA=$(git show "$GITHUB_SHA:scripts/lib/release-version.js" | sha256sum | cut -d ' ' -f1)
          node scripts/preflight-release-state.js

          {
            echo "client_sha256=${CLIENT_SHA}"
            echo "metadata_sha256=${METADATA_SHA}"
            echo "signer_sha256=${SIGNER_SHA}"
            echo "source_sha256=${SOURCE_SHA}"
            echo "version=${VERSION}"
            echo "version_policy_sha256=${VERSION_POLICY_SHA}"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: error
          name: chzzk-signing-input-${{ github.sha }}
          path: |
            dist/release/chzzk-${{ steps.release.outputs.version }}.zip
            dist/release/chzzk-${{ steps.release.outputs.version }}-release-metadata.json
            scripts/lib/amo-client.js
            scripts/lib/release-version.js
            scripts/sign-unlisted.js
          retention-days: 7
      - if: steps.release.outputs.reuse_existing == 'true' || steps.release.outputs.draft_signed_ready == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: error
          name: chzzk-signed-${{ github.sha }}
          path: dist/release/chzzk-${{ steps.release.outputs.version }}-signed.xpi
          retention-days: 7

  sign:
    needs: prepare
    if: needs.prepare.outputs.reuse_existing != 'true' && needs.prepare.outputs.draft_signed_ready != 'true'
    environment: firefox-signing
    permissions:
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chzzk-signing-input-${{ github.sha }}
          path: prepared
      - name: Verify signing input digests
        run: |
          set -euo pipefail
          node -e 'const major=Number(process.versions.node.split(".")[0]); if (major < 20) throw new Error("Node 20 or newer is required")'
          VERSION="${{ needs.prepare.outputs.version }}"
          test "$(sha256sum "prepared/dist/release/chzzk-${VERSION}.zip" | cut -d ' ' -f1)" = "${{ needs.prepare.outputs.source_sha256 }}"
          test "$(sha256sum "prepared/dist/release/chzzk-${VERSION}-release-metadata.json" | cut -d ' ' -f1)" = "${{ needs.prepare.outputs.metadata_sha256 }}"
          test "$(sha256sum prepared/scripts/sign-unlisted.js | cut -d ' ' -f1)" = "${{ needs.prepare.outputs.signer_sha256 }}"
          test "$(sha256sum prepared/scripts/lib/amo-client.js | cut -d ' ' -f1)" = "${{ needs.prepare.outputs.client_sha256 }}"
          test "$(sha256sum prepared/scripts/lib/release-version.js | cut -d ' ' -f1)" = "${{ needs.prepare.outputs.version_policy_sha256 }}"
      - name: Submit exact prepared archive to AMO
        env:
          AMO_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          CHZZK_RELEASE_METADATA: prepared/dist/release/chzzk-${{ needs.prepare.outputs.version }}-release-metadata.json
          CHZZK_SIGNED_OUTPUT_DIR: signed
          CHZZK_UNSIGNED_XPI: prepared/dist/release/chzzk-${{ needs.prepare.outputs.version }}.zip
        run: node prepared/scripts/sign-unlisted.js
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: error
          name: chzzk-signed-${{ github.sha }}
          path: signed/chzzk-${{ needs.prepare.outputs.version }}-signed.xpi
          retention-days: 7

  verify-signed:
    needs: [prepare, sign]
    if: always() && needs.prepare.result == 'success' && (needs.sign.result == 'success' || needs.prepare.outputs.reuse_existing == 'true' || needs.prepare.outputs.draft_signed_ready == 'true')
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      signed_sha256: ${{ steps.verify.outputs.signed_sha256 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: npm
          node-version: 22
      - run: npm ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chzzk-signing-input-${{ github.sha }}
          path: prepared
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chzzk-signed-${{ github.sha }}
          path: signed
      - id: verify
        name: Verify signed runtime against immutable release metadata
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          SOURCE="prepared/dist/release/chzzk-${VERSION}.zip"
          METADATA="prepared/dist/release/chzzk-${VERSION}-release-metadata.json"
          SIGNED="signed/chzzk-${VERSION}-signed.xpi"
          test "$(sha256sum "$SOURCE" | cut -d ' ' -f1)" = "${{ needs.prepare.outputs.source_sha256 }}"
          test "$(sha256sum "$METADATA" | cut -d ' ' -f1)" = "${{ needs.prepare.outputs.metadata_sha256 }}"
          CHZZK_RELEASE_METADATA="$METADATA" \
            CHZZK_SIGNED_XPI="$SIGNED" \
            CHZZK_UNSIGNED_XPI="$SOURCE" \
            npm run verify:signed-release
          SIGNED_SHA=$(sha256sum "$SIGNED" | cut -d ' ' -f1)
          if [ "${{ needs.prepare.outputs.reuse_existing }}" = "true" ]; then
            test "$SIGNED_SHA" = "${{ needs.prepare.outputs.signed_sha256 }}"
          fi
          echo "signed_sha256=${SIGNED_SHA}" >> "$GITHUB_OUTPUT"
          mkdir -p release-assets
          cp "$SOURCE" "$METADATA" "$SIGNED" release-assets/
      - run: npm run setup:firefox-signed-smoke
      - name: Require stock Firefox to trust and permanently install the signed XPI
        env:
          CHZZK_RELEASE_METADATA: prepared/dist/release/chzzk-${{ needs.prepare.outputs.version }}-release-metadata.json
          CHZZK_SIGNED_SMOKE_MODE: install
          CHZZK_SIGNED_XPI: signed/chzzk-${{ needs.prepare.outputs.version }}-signed.xpi
          FIREFOX_BINARY: ${{ github.workspace }}/dist/signed-smoke-tools/firefox/firefox
          GECKODRIVER_BINARY: ${{ github.workspace }}/dist/signed-smoke-tools/geckodriver
        run: npm run test:firefox-signed-smoke
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: error
          name: chzzk-release-assets-${{ github.sha }}
          path: release-assets/*
          retention-days: 7

  attest:
    needs: [prepare, verify-signed]
    if: needs.prepare.outputs.reuse_existing != 'true'
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chzzk-release-assets-${{ github.sha }}
          path: release-assets
      - name: Verify release asset digests before attestation
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          test "$(sha256sum "release-assets/chzzk-${VERSION}.zip" | cut -d ' ' -f1)" = "${{ needs.prepare.outputs.source_sha256 }}"
          test "$(sha256sum "release-assets/chzzk-${VERSION}-release-metadata.json" | cut -d ' ' -f1)" = "${{ needs.prepare.outputs.metadata_sha256 }}"
          test "$(sha256sum "release-assets/chzzk-${VERSION}-signed.xpi" | cut -d ' ' -f1)" = "${{ needs.verify-signed.outputs.signed_sha256 }}"
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: release-assets/*

  stage:
    needs: [attest, prepare, verify-signed]
    if: needs.prepare.outputs.reuse_existing != 'true'
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chzzk-release-assets-${{ github.sha }}
          path: release-assets
      - name: Stage exact attested release draft assets
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="v${VERSION}"
          SOURCE="release-assets/chzzk-${VERSION}.zip"
          METADATA="release-assets/chzzk-${VERSION}-release-metadata.json"
          SIGNED="release-assets/chzzk-${VERSION}-signed.xpi"
          test "$(sha256sum "$SOURCE" | cut -d ' ' -f1)" = "${{ needs.prepare.outputs.source_sha256 }}"
          test "$(sha256sum "$METADATA" | cut -d ' ' -f1)" = "${{ needs.prepare.outputs.metadata_sha256 }}"
          test "$(sha256sum "$SIGNED" | cut -d ' ' -f1)" = "${{ needs.verify-signed.outputs.signed_sha256 }}"

          verify_release_identity() {
            EXPECTED_DRAFT="$1"
            EXPECTED_IMMUTABLE="$2"
            test "$(gh release view "$TAG" --json isDraft --jq .isDraft)" = "$EXPECTED_DRAFT"
            test "$(gh release view "$TAG" --json isPrerelease --jq .isPrerelease)" = "false"
            if [ "$EXPECTED_DRAFT" = "true" ]; then
              if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
                TYPE=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq .object.type)
                TAG_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq .object.sha)
                if [ "$TYPE" = "tag" ]; then
                  TAG_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_SHA}" --jq .object.sha)
                fi
                test "$TAG_SHA" = "$GITHUB_SHA"
              else
                test "$(gh release view "$TAG" --json targetCommitish --jq .targetCommitish)" = "$GITHUB_SHA"
              fi
            else
              TYPE=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq .object.type)
              TAG_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq .object.sha)
              if [ "$TYPE" = "tag" ]; then
                TAG_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_SHA}" --jq .object.sha)
              fi
              test "$TAG_SHA" = "$GITHUB_SHA"
            fi
            test "$(gh release view "$TAG" --json isImmutable --jq .isImmutable)" = "$EXPECTED_IMMUTABLE"
          }

          verify_exact_assets() {
            test "$(gh release view "$TAG" --json assets --jq '.assets | length')" = "3"
            VERIFY_DIR=$(mktemp -d)
            gh release download "$TAG" --dir "$VERIFY_DIR" \
              --pattern "chzzk-${VERSION}.zip" \
              --pattern "chzzk-${VERSION}-release-metadata.json" \
              --pattern "chzzk-${VERSION}-signed.xpi"
            cmp "$SOURCE" "$VERIFY_DIR/chzzk-${VERSION}.zip"
            cmp "$METADATA" "$VERIFY_DIR/chzzk-${VERSION}-release-metadata.json"
            cmp "$SIGNED" "$VERIFY_DIR/chzzk-${VERSION}-signed.xpi"
            rm -rf "$VERIFY_DIR"
          }

          sync_draft_assets() {
            REMOTE_ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name')
            while IFS= read -r REMOTE_ASSET; do
              case "$REMOTE_ASSET" in
                ""|"$(basename "$SOURCE")"|"$(basename "$METADATA")"|"$(basename "$SIGNED")") ;;
                *) echo "Refusing unexpected draft asset: ${REMOTE_ASSET}" >&2; return 1 ;;
              esac
            done <<< "$REMOTE_ASSETS"

            VERIFY_DIR=$(mktemp -d)
            for ASSET in "$SOURCE" "$METADATA" "$SIGNED"; do
              NAME=$(basename "$ASSET")
              FOUND=false
              while IFS= read -r REMOTE_ASSET; do
                if [ "$REMOTE_ASSET" = "$NAME" ]; then
                  FOUND=true
                  break
                fi
              done <<< "$REMOTE_ASSETS"
              if [ "$FOUND" = "true" ]; then
                rm -rf "$VERIFY_DIR"
                VERIFY_DIR=$(mktemp -d)
                gh release download "$TAG" --dir "$VERIFY_DIR" --pattern "$NAME"
                cmp "$ASSET" "$VERIFY_DIR/$NAME"
              else
                gh release upload "$TAG" "$ASSET"
              fi
            done
            rm -rf "$VERIFY_DIR"
          }

          if gh release view "$TAG" >/dev/null 2>&1; then
            DRAFT_STATE=$(gh release view "$TAG" --json isDraft --jq .isDraft)
            if [ "$DRAFT_STATE" = "false" ]; then
              verify_release_identity false true
              verify_exact_assets
              exit 0
            fi
            test "$DRAFT_STATE" = "true"
            verify_release_identity true false
          else
            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
              echo "Refusing to publish over an orphaned existing tag: ${TAG}" >&2
              exit 1
            fi
            if ! gh release create "$TAG" \
              --draft \
              --generate-notes \
              --target "$GITHUB_SHA" \
              --title "CHZZK ${VERSION}"; then
              gh release view "$TAG" >/dev/null
            fi
            verify_release_identity true false
          fi

          sync_draft_assets
          verify_release_identity true false
          verify_exact_assets

  complete:
    needs: [attest, prepare, sign, stage, verify-signed]
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require either verified reuse or the full sign-attest-stage chain
        run: |
          set -euo pipefail
          test "${{ needs.prepare.result }}" = "success"
          test "${{ needs.verify-signed.result }}" = "success"
          if [ "${{ needs.prepare.outputs.reuse_existing }}" = "true" ]; then
            test "${{ needs.sign.result }}" = "skipped"
            test "${{ needs.attest.result }}" = "skipped"
            test "${{ needs.stage.result }}" = "skipped"
          elif [ "${{ needs.prepare.outputs.draft_signed_ready }}" = "true" ]; then
            test "${{ needs.sign.result }}" = "skipped"
            test "${{ needs.attest.result }}" = "success"
            test "${{ needs.stage.result }}" = "success"
          else
            test "${{ needs.sign.result }}" = "success"
            test "${{ needs.attest.result }}" = "success"
            test "${{ needs.stage.result }}" = "success"
          fi
