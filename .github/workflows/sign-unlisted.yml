name: Sign and publish Firefox add-on

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Create or update the GitHub release for this package version
        required: true
        type: boolean
        default: true
  push:
    branches: ["main"]
    paths:
      - "manifest.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/sign-unlisted.yml"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  sign-unlisted:
    runs-on: ubuntu-latest
    environment: firefox-signing
    steps:
      - uses: actions/checkout@v4
      - name: Enforce protected signing ref
        run: |
          set -euo pipefail
          default_ref="refs/heads/${{ github.event.repository.default_branch }}"
          case "${{ github.ref }}" in
            "$default_ref"|refs/tags/v*) ;;
            *)
              echo "Signing is allowed only from the default branch or v* release tags." >&2
              exit 1
              ;;
          esac
          if [ "${{ github.ref_protected }}" != "true" ]; then
            echo "Signing ref must be protected before AMO credentials are used." >&2
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - name: Prepare package metadata
        id: package
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          {
            echo "version=$version"
            echo "tag=v$version"
            echo "release_xpi=dist/chzzk-${version}-signed.xpi"
          } >> "$GITHUB_OUTPUT"
      - name: Sign with AMO unlisted channel
        run: npm run sign:unlisted
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
      - name: Normalize signed XPI name and checksum
        id: signed_xpi
        run: |
          set -euo pipefail
          version="${{ steps.package.outputs.version }}"
          release_xpi="${{ steps.package.outputs.release_xpi }}"
          signed_count=$(find dist/signed -maxdepth 1 -type f -name '*.xpi' | wc -l | tr -d ' ')
          test "$signed_count" = "1"
          signed_xpi=$(find dist/signed -maxdepth 1 -type f -name '*.xpi' | head -n 1)
          cp "$signed_xpi" "$release_xpi"
          test -f "$release_xpi"
          sha256=$(sha256sum "$release_xpi" | cut -d' ' -f1)
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
      - run: npm run build:update-manifest
      - run: npm run validate:update-manifest
      - name: Attest release provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/chzzk-${{ steps.package.outputs.version }}.zip
            dist/chzzk-${{ steps.package.outputs.version }}-signed.xpi
      - name: Write release notes
        run: |
          set -euo pipefail
          zip_sha=$(sha256sum "dist/chzzk-${{ steps.package.outputs.version }}.zip" | cut -d' ' -f1)
          cat > release-notes.md <<EOF
          ## Summary
          - AMO unlisted signed Firefox install package.
          - Firefox automatic-update manifest targets the private internal HTTPS update host.
          - GitHub artifact attestations bind release assets to this signing workflow and source commit.

          ## Source provenance
          - Repository: ${{ github.repository }}
          - Commit: ${{ github.sha }}
          - Workflow: .github/workflows/sign-unlisted.yml

          ## Update manifest
          - https://chzzk-updates.alpha-apple.dedyn.io/updates.json

          ## Assets
          - \`chzzk-${{ steps.package.outputs.version }}-signed.xpi\` — signed install/update package.
          - \`chzzk-${{ steps.package.outputs.version }}.zip\` — unsigned source/runtime package from \`web-ext build\`.

          ## Checksums
          - \`chzzk-${{ steps.package.outputs.version }}-signed.xpi\` SHA-256: \`${{ steps.signed_xpi.outputs.sha256 }}\`
          - \`chzzk-${{ steps.package.outputs.version }}.zip\` SHA-256: \`${zip_sha}\`
          EOF
      - name: Create or update release
        if: ${{ github.event_name == 'push' || inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.package.outputs.tag }}"
          version="${{ steps.package.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "dist/chzzk-${version}.zip" "dist/chzzk-${version}-signed.xpi" --clobber
            gh release edit "$tag" --title "CHZZK ${version}" --notes-file release-notes.md --latest
          else
            gh release create "$tag" "dist/chzzk-${version}.zip" "dist/chzzk-${version}-signed.xpi" \
              --target "$GITHUB_SHA" \
              --title "CHZZK ${version}" \
              --notes-file release-notes.md \
              --latest
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: chzzk-signed-xpi
          path: dist/chzzk-${{ steps.package.outputs.version }}-signed.xpi
      - uses: actions/upload-artifact@v4
        with:
          name: chzzk-update-site
          path: dist/update-site
